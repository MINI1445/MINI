<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>文学偏好测试 | 句子感知问卷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #002FA7; /* 克莱因蓝 */
            font-family: '宋体', 'SimSun', 'Times New Roman', serif;
            color: #f0f3fc;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 12px;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: normal;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,240,0.3);
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }

        .sub {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        /* 进度指示 */
        .progress-area {
            background: rgba(255,255,255,0.12);
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .progress-bar {
            background: #FFE484;
            height: 8px;
            border-radius: 40px;
            width: 0%;
            transition: width 0.2s ease;
        }

        .counter {
            text-align: right;
            font-size: 0.8rem;
            margin-top: 6px;
            opacity: 0.8;
        }

        /* 卡片：题目区 */
        .quiz-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        .sentence {
            font-size: 1.55rem;
            line-height: 1.4;
            font-weight: 500;
            margin-bottom: 28px;
            text-align: center;
            font-family: '宋体', 'SimSun', serif;
            word-break: break-word;
            background: rgba(0,0,0,0.2);
            padding: 18px 12px;
            border-radius: 20px;
        }

        .question-text {
            font-size: 1rem;
            margin-bottom: 18px;
            text-align: center;
            letter-spacing: 1px;
            font-weight: normal;
            border-left: 3px solid #FFE484;
            padding-left: 12px;
            margin-left: 8px;
        }

        /* 选项按钮组 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .opt-btn {
            background: rgba(255,255,245,0.15);
            border: 1px solid rgba(255,255,200,0.4);
            border-radius: 60px;
            padding: 12px 20px;
            font-family: '宋体', 'SimSun', serif;
            font-size: 1rem;
            color: #fff5e6;
            text-align: left;
            transition: all 0.2s;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .opt-btn:hover {
            background: rgba(255,228,132,0.3);
            border-color: #FFE484;
            transform: scale(0.98);
        }

        /* 结果区域 */
        .result-container {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 28px 20px;
            text-align: center;
            margin-top: 16px;
        }

        .result-type {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 16px;
            color: #FFE484;
        }

        .result-desc {
            font-size: 1.05rem;
            line-height: 1.5;
            text-align: left;
        }

        .reset-btn {
            background: #FFE484;
            border: none;
            color: #002FA7;
            padding: 12px 28px;
            font-size: 1rem;
            font-family: '宋体', 'SimSun', serif;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 28px;
            cursor: pointer;
            transition: 0.2s;
            width: 80%;
            max-width: 260px;
        }

        .reset-btn:active {
            transform: scale(0.96);
            background: #ffda5c;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 32px;
            opacity: 0.6;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>句子·感知录</h1>
        <div class="sub">从一行文字里，打捞你的文学偏好</div>
    </div>

    <!-- 进度条 -->
    <div class="progress-area">
        <div class="progress-bar" id="progressFill"></div>
        <div class="counter" id="questionCounter">第1 / 20题</div>
    </div>

    <!-- 动态区域：题目卡片 或 结果 -->
    <div id="quizPanel" class="quiz-card">
        <!-- js 动态渲染 -->
    </div>
</div>

<script>
    // ----- 题目库（20个文学句子 + 选项：感知维度）
    // 每个句子：text, options数组, 每个选项带分值（对应四种文学气质）
    // 四种结果类型：古典沉静 / 浪漫炽烈 / 冷峻哲思 / 梦幻游离
    const QUESTIONS = [
        { text: "月光还是少年的月光，九州一色还是李白的霜。", options: ["孤高而怀旧", "浪漫与乡愁", "时间流逝的苍凉", "清冷又唯美"] },
        { text: "她从此住在风里，荡过原野，路过山茶花的春天。", options: ["自由轻盈", "温柔缱绻", "稍纵即逝的美", "童话般的梦境"] },
        { text: "所有的星星终将熄灭，可它们无畏地燃烧。", options: ["悲壮且明亮", "存在主义热血", "瞬间与永恒", "冷冽的鼓舞"] },
        { text: "旧书页里夹着一朵干枯的紫罗兰，颜色褪成了黄昏。", options: ["怀旧的伤感", "静止的时间", "褪色的浪漫", "静谧的哀愁"] },
        { text: "他在人群中像一座孤岛，却暗自拥有整片海洋。", options: ["孤独的力量", "内向的丰饶", "疏离的诗意", "沉静的深度"] },
        { text: "雨落在瓦片上，像古代的信使，送来无人解读的密语。", options: ["古意与神秘", "时光的回响", "潮湿的叙事", "寂寥的韵味"] },
        { text: "我爱你，始于雪落，止于冰川融化。", options: ["决绝的深情", "自然意象的爱", "季节的隐喻", "冰冷又灼热"] },
        { text: "我们像两颗误入大气层的流星，短暂交辉后各自焚毁。", options: ["宿命的悲剧", "耀眼易碎", "相遇的意义", "宇宙级浪漫"] },
        { text: "黄昏把世界调成静音，剩下钟摆和心跳的合谋。", options: ["宁静的哲思", "内省时刻", "柔软的空寂", "时间的独白"] },
        { text: "她的裙摆掀起一场小型春风，蝴蝶停在了旧钢琴上。", options: ["灵动而生趣", "印象派片段", "俏皮与优雅", "轻盈的梦幻"] },
        { text: "海明威说巴黎是一席流动的盛宴，而我只想醉倒在莎士比亚书店。", options: ["文艺朝圣", "波西米亚情结", "书与酒的沉迷", "旧时光迷恋"] },
        { text: "墓碑上刻着一行小字：‘他曾热烈地爱过傍晚的云。’", options: ["平淡而深刻", "朴实动人", "生之眷恋", "微小的永恒"] },
        { text: "猫跃上围墙，把月亮踩碎成一片一片的银箔。", options: ["奇幻灵动", "童真想象", "超现实美感", "诗意调皮"] },
        { text: "晨雾像未醒的梦，裹住了整个镇子。", options: ["朦胧淡远", "水墨画意", "安宁的幽静", "半醒的温柔"] },
        { text: "他走以后，每一场雪都像迟到的告别。", options: ["思念的具象", "季节的哀愁", "缓慢的疼痛", "漫长的回声"] },
        { text: "诗句在舌尖化成果核，种下了一棵沉默的树。", options: ["言语的无力", "内化的诗意", "生长的秘密", "禅意的钝感"] },
        { text: "烟花是写给夜空的情书，写尽灿烂，随即成灰。", options: ["壮烈短暂", "绚丽的虚无", "炙热告白", "易碎的美学"] },
        { text: "抽屉里放着一块旧怀表，指针永远停在下午四点。", options: ["凝固的往事", "时间的标本", "失落的纪念", "安静的悬念"] },
        { text: "风把落叶卷成漩涡，像一个个未完成的句子。", options: ["萧瑟的未尽", "秋的修辞", "飘零的韵律", "自然的手稿"] },
        { text: "在图书馆最暗的角落，她听见普鲁斯特轻轻叹息。", options: ["意识的回声", "追寻逝去的时间", "文学的共鸣", "孤独的丰盈"] }
    ];

    // 每个选项对应四种气质的分值分配 (古典沉静, 浪漫炽烈, 冷峻哲思, 梦幻游离)
    // 为了让结果有趣，稍微手动设计映射 (根据句子的直觉)
    const SCORE_MAP = [
        // Q0
        [ [2,1,0,0], [1,3,0,0], [1,0,2,0], [0,0,0,3] ],
        // Q1
        [ [0,0,0,3], [1,2,0,1], [0,0,2,1], [0,1,0,2] ],
        // Q2
        [ [0,2,1,0], [0,1,3,0], [1,1,2,0], [0,0,0,2] ],
        // Q3
        [ [3,0,0,1], [0,2,0,1], [2,0,1,0], [0,0,0,2] ],
        // Q4
        [ [2,0,2,0], [0,1,0,2], [1,0,3,0], [1,1,0,1] ],
        // Q5
        [ [2,0,1,0], [0,1,0,1], [1,1,2,0], [0,0,0,2] ],
        // Q6
        [ [0,3,0,0], [0,2,0,1], [0,0,1,0], [1,2,0,1] ],
        // Q7
        [ [1,2,0,0], [0,2,1,0], [0,1,2,0], [0,1,0,2] ],
        // Q8
        [ [2,0,2,0], [0,1,0,1], [1,0,3,0], [1,0,0,1] ],
        // Q9
        [ [0,0,0,2], [1,1,0,2], [0,0,1,0], [0,1,0,3] ],
        // Q10
        [ [1,2,0,0], [0,3,0,0], [0,0,1,1], [0,0,0,2] ],
        // Q11
        [ [2,1,1,0], [0,2,0,1], [1,0,2,0], [0,1,0,1] ],
        // Q12
        [ [0,0,0,2], [0,1,0,2], [1,0,1,0], [0,0,0,3] ],
        // Q13
        [ [3,0,0,1], [0,1,0,0], [1,0,2,0], [0,0,0,2] ],
        // Q14
        [ [2,0,1,0], [1,2,0,0], [1,0,2,0], [0,1,0,1] ],
        // Q15
        [ [2,0,1,1], [0,1,0,1], [1,0,2,0], [0,1,0,2] ],
        // Q16
        [ [0,2,1,0], [0,3,0,0], [0,0,2,0], [1,1,0,1] ],
        // Q17
        [ [2,0,1,0], [0,1,0,1], [1,0,2,0], [0,0,0,2] ],
        // Q18
        [ [2,0,1,1], [0,1,0,1], [1,0,2,0], [0,0,0,2] ],
        // Q19
        [ [0,0,2,0], [0,1,0,2], [1,0,2,0], [0,0,0,3] ]
    ];

    // 确保长度匹配
    console.assert(QUESTIONS.length === 20 && SCORE_MAP.length === 20, "题库长度不对");

    // 存储用户每道题的选择（索引：0~3对应每题的选项索引）
    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;      // 当前第几题 (0-index)
    let quizFinished = false;

    // DOM 元素
    const quizPanel = document.getElementById('quizPanel');
    const progressFill = document.getElementById('progressFill');
    const questionCounter = document.getElementById('questionCounter');

    // 渲染当前题目
    function renderCurrentQuestion() {
        if (quizFinished) {
            renderResult();
            return;
        }
        if (currentIndex >= 20) {
            finishQuiz();
            return;
        }

        const q = QUESTIONS[currentIndex];
        const selectedIdx = userAnswers[currentIndex]; // null 或 0~3

        let html = `
            <div class="sentence">“${q.text}”</div>
            <div class="question-text">从这个句子里，你更感受到？</div>
            <div class="options">
        `;
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedIdx === idx);
            const additionalStyle = isSelected ? 'background: rgba(255,228,132,0.4); border-color: #FFE484;' : '';
            html += `
                <div class="opt-btn" data-opt-index="${idx}" style="${additionalStyle}">
                    ${String.fromCharCode(65+idx)} · ${opt}
                </div>
            `;
        });
        html += `</div>`;

        quizPanel.innerHTML = html;

        // 绑定选项点击事件
        const btns = quizPanel.querySelectorAll('.opt-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const optIndex = parseInt(btn.dataset.optIndex);
                // 保存答案
                userAnswers[currentIndex] = optIndex;
                // 自动下一题
                if (currentIndex + 1 < 20) {
                    currentIndex++;
                    renderCurrentQuestion();
                    updateProgress();
                } else {
                    // 已经是最后一题，完成测验
                    finishQuiz();
                }
                updateProgress();
            });
        });
    }

    function updateProgress() {
        let answeredCount = userAnswers.filter(a => a !== null).length;
        let percent = (answeredCount / 20) * 100;
        progressFill.style.width = percent + "%";
        if (!quizFinished && currentIndex < 20) {
            questionCounter.innerText = `第${currentIndex+1} / 20题 · 已答${answeredCount}题`;
        } else {
            questionCounter.innerText = `已完成 ${answeredCount}/20 题`;
        }
    }

    function finishQuiz() {
        // 检查是否所有题目都选了
        const allAnswered = userAnswers.every(idx => idx !== null);
        if (!allAnswered) {
            // 如果没答完，提示并且定位到第一个没答的题
            const firstNull = userAnswers.findIndex(a => a === null);
            if (firstNull !== -1) {
                currentIndex = firstNull;
                renderCurrentQuestion();
                updateProgress();
                alert("请完成所有题目再查看结果～");
                return;
            }
        }
        quizFinished = true;
        renderResult();
        updateProgress();
    }

    // 结果计算 (四个维度累积)
    function computeResultType() {
        let scores = [0,0,0,0]; // 古典沉静,浪漫炽烈,冷峻哲思,梦幻游离
        for (let i = 0; i < 20; i++) {
            const answerIdx = userAnswers[i];
            if (answerIdx === null) continue;
            const mapRow = SCORE_MAP[i][answerIdx];
            for (let d=0; d<4; d++) {
                scores[d] += mapRow[d];
            }
        }
        // 找出最高分的维度
        const typeNames = ["古典沉静型", "浪漫炽烈型", "冷峻哲思型", "梦幻游离型"];
        const descMap = {
            0: "你偏爱古典含蓄的文字，如月下听琴、山间煮雪。你的内心有一片安宁的湖，倒映着旧时月光。文学于你，是缓流的长河。",
            1: "你是玫瑰与烈风的孩子，拥抱炽热、激情与不灭的爱意。读你的句子像饮下火焰，浪漫是你灵魂的母语。",
            2: "你习惯在文字中审视存在，追问意义。冷峻如刃，却藏着慈悲。你喜欢卡夫卡式的悖谬与加缪式的清醒。",
            3: "你迷恋意象的跃动、梦境的逻辑。文字在你的感知里成为羽毛、雾气或萤火虫。游离现实，天真又深邃。"
        };
        let maxScore = Math.max(...scores);
        let dominant = scores.indexOf(maxScore);
        return { type: typeNames[dominant], description: descMap[dominant], raw: scores };
    }

    function renderResult() {
        const result = computeResultType();
        let html = `
            <div class="result-container">
                <div class="result-type">✨ ${result.type}</div>
                <div class="result-desc">${result.description}</div>
                <button class="reset-btn" id="resetTestBtn">重新测试</button>
            </div>
        `;
        quizPanel.innerHTML = html;
        const resetBtn = document.getElementById('resetTestBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                // 重置所有
                userAnswers = new Array(20).fill(null);
                currentIndex = 0;
                quizFinished = false;
                renderCurrentQuestion();
                updateProgress();
            });
        }
    }

    // 初始化
    function init() {
        renderCurrentQuestion();
        updateProgress();
    }

    init();
</script>
</body>
</html>
